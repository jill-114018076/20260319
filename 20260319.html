<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>可愛履歷</title>

<style>
body {
    font-family: "Microsoft JhengHei", sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #f8f9ff, #ffeef5);
}

/* 氣泡 */
.bubble {
    position: fixed;
    bottom: -50px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
    animation: float 12s linear infinite;
}

@keyframes float {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-110vh); opacity: 0; }
}

/* 主容器 */
.resume {
    display: flex;
    max-width: 1000px;
    margin: 60px auto;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    background: white;
}

/* 左側（側邊欄） */
.left {
    width: 35%;
    background: linear-gradient(180deg, #ffcad4, #ffd6e0);
    padding: 30px 20px;
    text-align: center;
    color: #444;
}

.profile-pic {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    border: 6px solid white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    margin-bottom: 15px;
}

/* 右側 */
.right {
    width: 65%;
    padding: 40px;
}

/* 標題 */
h1 {
    margin: 0;
    font-size: 30px;
    letter-spacing: 1px;
}

.title {
    color: #999;
    margin: 8px 0;
}

.student-id {
    color: #ff6b9a;
    font-weight: bold;
    margin-bottom: 25px;
}

/* 小標題 */
h2 {
    margin-top: 25px;
    font-size: 18px;
    border-left: 5px solid #ffb6c1;
    padding-left: 10px;
}

/* 卡片 */
.card {
    background: #fff;
    padding: 12px 15px;
    border-radius: 12px;
    margin: 10px 0;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-3px);
}

/* 按鈕 */
button {
    margin-top: 25px;
    padding: 12px 18px;
    border: none;
    background: linear-gradient(45deg, #ff9a9e, #ffb6c1);
    color: white;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 14px;
}

button:hover {
    transform: scale(1.05);
}

/* 手機版 */
@media (max-width: 768px) {
    .resume {
        flex-direction: column;
    }

    .left, .right {
        width: 100%;
    }

    .right {
        padding: 25px;
    }
}
</style>

</head>
<body>

<div class="resume">
    <!-- 左側 -->
    <div class="left">
        <img src="images/photo.jpg" class="profile-pic">

        <h2>基本資料</h2>
        <div class="card">姓名：蔡某某</div>
        <div class="card">學號：114018076</div>
        <div class="card">電話：0912-345-678</div>
        <div class="card">Email：example@gmail.com</div>

        <h2>技能</h2>
        <div class="card">HTML / CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">設計美編</div>
    </div>

    <!-- 右側 -->
    <div class="right">
        <h1>蔡某某</h1>
        <p class="title">前端工程師</p>
        <p class="student-id">學號：114018076</p>

        <h2>自我介紹</h2>
        <p class="card">
            我喜歡製作可愛又有互動感的網站，讓使用者感受到設計的溫度 ✨
        </p>

        <h2>學歷</h2>
        <p class="card">某某大學 資訊管理系</p>

        <h2>工作經驗</h2>
        <p class="card">ABC公司 - 前端工程師 (2022 - 2025)</p>

        <button onclick="changeTheme()">換主題色 🌈</button>
    </div>
</div>

<script>
// Some code thanks to @chrisgannon

var select = function(s) {
  return document.querySelector(s);
}

function randomBetween(min,max)
{
    var number = Math.floor(Math.random()*(max-min+1)+min);
  
    if ( number !== 0 ){
      return number;
    }else {
      return 0.5;
    }
}

var tl = new TimelineMax();

for(var i = 0; i < 20; i++){

  var t = TweenMax.to(select('.bubble' + i), randomBetween(1, 1.5), {
    x: randomBetween(12, 15) * (randomBetween(-1, 1)),
    y: randomBetween(12, 15) * (randomBetween(-1, 1)), 
    repeat:-1,
    repeatDelay:randomBetween(0.2, 0.5),
    yoyo:true,
    ease:Elastic.easeOut.config(1, 0.5)
  })

  tl.add(t, (i+1)/0.6)
}

tl.seek(50);
</script>

</body>
</html>
