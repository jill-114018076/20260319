<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>可愛履歷</title>

<style>
body {
    font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
    margin: 0;
    background: #f4f6f9;
    color: #333;
}

/* 主容器 */
.resume {
    display: flex;
    max-width: 1000px;
    margin: 50px auto;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* 左側（側邊欄） */
.left {
    width: 32%;
    background: #1e2a38;
    color: white;
    padding: 30px 20px;
    text-align: center;
}

/* 頭像 */
.profile-pic {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ffffff;
    margin-bottom: 15px;
}

/* 左側標題 */
.left h2 {
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding-bottom: 5px;
    margin-top: 20px;
}

/* 卡片（左側簡化） */
.left .card {
    background: transparent;
    box-shadow: none;
    margin: 8px 0;
    padding: 5px;
    font-size: 14px;
}

/* 右側 */
.right {
    width: 68%;
    padding: 40px;
}

/* 主標題 */
h1 {
    margin: 0;
    font-size: 30px;
    color: #1e2a38;
}

/* 副標 */
.title {
    color: #666;
    margin-bottom: 5px;
}

.student-id {
    color: #888;
    margin-bottom: 20px;
}

/* 區塊標題 */
.right h2 {
    border-bottom: 2px solid #1e2a38;
    padding-bottom: 5px;
    margin-top: 25px;
    font-size: 18px;
}

/* 卡片 */
.card {
    background: #f9fafb;
    padding: 12px 15px;
    border-radius: 6px;
    margin-bottom: 10px;
    border: 1px solid #e5e7eb;
}

/* 按鈕 */
button {
    margin-top: 25px;
    padding: 10px 16px;
    border: none;
    background: #1e2a38;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2c3e50;
}

/* 手機版 */
@media (max-width: 768px) {
    .resume {
        flex-direction: column;
    }
    .left, .right {
        width: 100%;
    }
}
</style>

</head>
<body>

<div class="resume">
    <!-- 左側 -->
    <div class="left">
        <img src="images/photo.jpg" class="profile-pic">

        <h2>基本資料</h2>
        <div class="card">姓名：蔡某某</div>
        <div class="card">學號：114018076</div>
        <div class="card">電話：0912-345-678</div>
        <div class="card">Email：example@gmail.com</div>

        <h2>技能</h2>
        <div class="card">HTML / CSS</div>
        <div class="card">JavaScript</div>
        <div class="card">設計美編</div>
    </div>

    <!-- 右側 -->
    <div class="right">
        <h1>蔡某某</h1>
        <p class="title">前端工程師</p>
        <p class="student-id">學號：114018076</p>

        <h2>自我介紹</h2>
        <p class="card">
            我喜歡製作可愛又有互動感的網站，讓使用者感受到設計的溫度 ✨
        </p>

        <h2>學歷</h2>
        <p class="card">某某大學 資訊管理系</p>

        <h2>工作經驗</h2>
        <p class="card">ABC公司 - 前端工程師 (2022 - 2025)</p>

        <button onclick="changeTheme()">換主題色 🌈</button>
    </div>
</div>

<script>
// Some code thanks to @chrisgannon

var select = function(s) {
  return document.querySelector(s);
}

function randomBetween(min,max)
{
    var number = Math.floor(Math.random()*(max-min+1)+min);
  
    if ( number !== 0 ){
      return number;
    }else {
      return 0.5;
    }
}

var tl = new TimelineMax();

for(var i = 0; i < 20; i++){

  var t = TweenMax.to(select('.bubble' + i), randomBetween(1, 1.5), {
    x: randomBetween(12, 15) * (randomBetween(-1, 1)),
    y: randomBetween(12, 15) * (randomBetween(-1, 1)), 
    repeat:-1,
    repeatDelay:randomBetween(0.2, 0.5),
    yoyo:true,
    ease:Elastic.easeOut.config(1, 0.5)
  })

  tl.add(t, (i+1)/0.6)
}

tl.seek(50);
</script>

</body>
</html>
